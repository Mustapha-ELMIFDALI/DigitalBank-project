spring.application.name=SmartBankAccount
server.port=8085

# MySQL config
spring.datasource.url=jdbc:mysql://localhost:3306/SmartBank2?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# DO NOT set hibernate.dialect manually ? let Spring Boot auto-detect

# H2 console (only useful if you switch datasource to H2)
# spring.h2.console.enabled=true