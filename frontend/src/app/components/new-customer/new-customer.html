<div class="container-fluid py-2">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

      <div class="d-flex align-items-center gap-2 mb-4">
        <a routerLink="/customers" class="btn btn-sm btn-outline-secondary">
          <i class="bi bi-arrow-left"></i>
        </a>
        <div>
          <h1 class="page-title mb-0">New Customer</h1>
          <p class="text-muted small mb-0">Create a new bank customer</p>
        </div>
      </div>

      @if (error) {
        <div class="alert alert-danger d-flex align-items-center gap-2">
          <i class="bi bi-exclamation-circle-fill"></i>{{ error }}
        </div>
      }

      <div class="card">
        <div class="card-header">Customer Information</div>
        <div class="card-body p-4">
          <form (ngSubmit)="submit()" #f="ngForm">

            <div class="mb-3">
              <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control" placeholder="e.g. Hassan Alami"
                       [(ngModel)]="form.name" name="name" required>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" placeholder="e.g. hassan@proton.com"
                       [(ngModel)]="form.email" name="email" required>
              </div>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary flex-grow-1" [disabled]="saving">
                @if (saving) {
                  <span class="spinner-border spinner-border-sm me-2"></span>Saving…
                } @else {
                  <i class="bi bi-check-lg me-1"></i>Create Customer
                }
              </button>
              <a routerLink="/customers" class="btn btn-outline-secondary">Cancel</a>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>
