<div class="login-wrapper d-flex align-items-center justify-content-center">

  <div class="login-card">

    <!-- Logo / brand -->
    <div class="text-center mb-4">
      <div class="login-logo mx-auto mb-3">
        <i class="bi bi-bank2 text-white fs-1"></i>
      </div>
      <h2 class="fw-bold" style="color:var(--db-primary)">DigitalBank</h2>
      <p class="text-muted small">Sign in to your account to continue</p>
    </div>

    @if (error) {
      <div class="alert alert-danger d-flex align-items-center gap-2 py-2">
        <i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
        <span>{{ error }}</span>
      </div>
    }

    <form (ngSubmit)="submit()" #f="ngForm" autocomplete="off">

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
          <input type="text" class="form-control" placeholder="Enter username"
                 [(ngModel)]="form.username" name="username"
                 autocomplete="username" required>
        </div>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input [type]="showPassword ? 'text' : 'password'" class="form-control"
                 placeholder="Enter password"
                 [(ngModel)]="form.password" name="password"
                 autocomplete="current-password" required>
          <button type="button" class="input-group-text bg-white" (click)="showPassword = !showPassword">
            <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" [disabled]="loading">
        @if (loading) {
          <span class="spinner-border spinner-border-sm me-2"></span>Signing in…
        } @else {
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        }
      </button>

    </form>

    <!-- Demo credentials hint -->
    <div class="hint-box mt-4 p-3 rounded">
      <p class="small fw-semibold mb-1" style="color:var(--db-primary)">
        <i class="bi bi-info-circle me-1"></i>Demo Credentials
      </p>
      <div class="small text-muted">
        <div><strong>Admin:</strong> admin / 1234</div>
        <div><strong>User:</strong> user1 / 1234</div>
      </div>
    </div>

  </div>
</div>
